<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upstage n8n JSON Builder</title>
  <style>
    body{font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;max-width:840px;margin:40px auto;padding:0 16px;line-height:1.5}
    .card{border:1px solid #ddd;border-radius:12px;padding:18px;margin:14px 0}
    label{display:block;font-weight:600;margin:8px 0 6px}
    input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}
    button{margin-top:14px;padding:10px 14px;border:0;border-radius:10px;background:#111;color:#fff;cursor:pointer}
    .muted{color:#666;font-size:13px}
    code{background:#f5f5f5;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <h1>Upstage n8n JSON Builder</h1>
  <p>브라우저에서만 API 키를 치환해 JSON을 다운로드합니다. 키는 서버로 전송되지 않습니다.</p>

  <div class="card">
    <label for="workflow">워크플로우 선택</label>
    <select id="workflow">
      <option value="workflow.upstage-hf-paper-summarizer.json">Basic</option>
      <option value="workflow.upstage-hf-paper-summarizer-advanced.json">Advanced + Feedback</option>
      <option value="workflow.research-orchestrator-pro.json">Research Orchestrator Pro</option>
    </select>

    <label for="apiKey">Upstage API Key</label>
    <input id="apiKey" type="password" placeholder="up_..." />
    <div class="muted">치환 대상 토큰: <code>REPLACE_WITH_YOUR_REAL_KEY</code></div>

    <button id="downloadBtn">치환된 JSON 다운로드</button>
  </div>

  <p class="muted">도메인: upstage-n8n.jaeyeong2026.com</p>

  <script src="./app.js"></script>
</body>
</html>
